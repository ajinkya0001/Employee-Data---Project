<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Welcome</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d') no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Dark overlay */
.overlay {
    background: rgba(0,0,0,0.6);
    width: 100%;
    height: 100%;
    position: absolute;
}

/* Content box */
.content {
    position: relative;
    text-align: center;
    color: white;
    z-index: 2;
}

.content h1 {
    font-size: 50px;
    margin-bottom: 10px;
}

.content p {
    font-size: 18px;
    margin-bottom: 30px;
    opacity: 0.9;
}

/* Buttons */
.btn {
    padding: 12px 30px;
    margin: 10px;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    text-decoration: none;
    color: white;
}

.login-btn {
    background: linear-gradient(120deg,#667eea,#764ba2);
}

.signup-btn {
    background: linear-gradient(120deg,#ff7e5f,#feb47b);
}

.btn:hover {
    opacity: 0.85;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="content">
    <h1>Employee Management System</h1>
    <p>Manage your employees efficiently with a modern dashboard</p>

    <a th:href="@{/login}" class="btn login-btn">Login</a>
    <a th:href="@{/signup}" class="btn signup-btn">Signup</a>
</div>

</body>
</html>
