<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>User Dashboard</title>

<style>
body {
    font-family:'Segoe UI';
    background: linear-gradient(120deg,#667eea,#764ba2);
    margin:0;
}

.container {
    width:450px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

h2 {
    text-align:center;
    margin-bottom:20px;
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:linear-gradient(120deg,#667eea,#764ba2);
    color:white;
    font-size:15px;
}

button:hover {
    opacity:0.9;
}
</style>
</head>

<body>

<div class="container">
<h2>Add Employee</h2>

<form th:action="@{/user/add-employee}" method="post">

    <input type="text" name="employeeName" placeholder="Employee Name" required>
    <input type="text" name="desg" placeholder="Designation" required>
    <input type="number" name="age" placeholder="Age" required>
    <input type="number" name="salary" placeholder="Salary" required>
    <input type="text" name="address" placeholder="Address" required>

    <button type="submit">Add Employee</button>

</form>

</div>

</body>
</html>
