<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Edit Empployee Details</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(120deg, #667eea, #764ba2);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .form-container {
        background: #ffffff;
        width: 420px;
        padding: 35px;
        border-radius: 16px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }

    .form-container h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }

    .form-group {
        margin-bottom: 18px;
    }

    .form-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        color: #555;
    }

    .form-group input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
        outline: none;
        transition: border-color 0.3s;
    }

    .form-group input:focus {
        border-color: #667eea;
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 25px;
        background: linear-gradient(120deg, #667eea, #764ba2);
        color: white;
        font-size: 15px;
        cursor: pointer;
        transition: opacity 0.3s;
    }

    .btn-submit:hover {
        opacity: 0.9;
    }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
    }

    .back-link a {
        text-decoration: none;
        color: #667eea;
    }

    .back-link a:hover {
        text-decoration: underline;
    }
</style>

</head>
<body>

<div class="form-container">

    <h2>Edit Employee Details</h2>

    <!-- 🔒 LOGIC KEPT EXACTLY SAME -->
    <form th:action="@{/employee/add}" th:object="${employee}" method="post">

        <input type="hidden" th:field="*{employeeId}" />

        <div class="form-group">
            <label>Employee Name</label>
            <input type="text" th:field="*{employeeName}" required>
        </div>

        <div class="form-group">
            <label>Designation</label>
            <input type="text" th:field="*{desg}" required>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" th:field="*{age}" required>
        </div>

        <div class="form-group">
            <label>Salary</label>
            <input type="number" th:field="*{salary}" required>
        </div>
        
        <div class="form-group">
            <label>Address</label>
            <input type="text" th:field="*{address}" required>
        </div>

        <input type="submit" value="Update Employee" class="btn-submit">

    </form>

    <div class="back-link">
        <a th:href="@{/employee/view-employees}">← Back to Employee List</a>
    </div>

</div>

</body>
</html>
