<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Login</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(120deg,#5f2c82,#49a09d);
}

.container {
    width:800px;
    height:450px;
    display:flex;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

.left {
    flex:1;
    background: linear-gradient(120deg,#667eea,#764ba2);
    color:white;
    padding:40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left h1 {
    margin-bottom:15px;
}

.left p {
    font-size:14px;
    opacity:0.9;
}

.right {
    flex:1;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.form-box {
    width:80%;
}

.form-box h2 {
    text-align:center;
    margin-bottom:20px;
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:20px;
    border:1px solid #ccc;
    outline:none;
}

button {
    width:100%;
    padding:10px;
    border:none;
    border-radius:20px;
    background:linear-gradient(120deg,#667eea,#764ba2);
    color:white;
    cursor:pointer;
}

button:hover {
    opacity:0.9;
}

.link {
    text-align:center;
    margin-top:10px;
}

.error {
    color:red;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

    <div class="left">
        <h1>Welcome Back 👋</h1>
        <p>Login to manage employees, track records and access dashboard features.</p>
    </div>

    <div class="right">
        <div class="form-box">
            <h2>Login</h2>

            <form th:action="@{/login}" method="post">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>

            <p class="error" th:if="${error}" th:text="${error}"></p>

            <div class="link">
                <a th:href="@{/signup}">New user? Signup</a>
            </div>
        </div>
    </div>

</div>

</body>
</html>
