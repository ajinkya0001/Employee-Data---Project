 <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Employee</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(120deg, #667eea, #764ba2);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .form-container {
        background: #ffffff;
        width: 420px;
        padding: 35px;
        border-radius: 16px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }

    .form-container h1 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }

    .form-group {
        margin-bottom: 18px;
    }

    .form-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        color: #555;
    }

    .form-group input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
        outline: none;
        transition: border-color 0.3s;
    }

    .form-group input:focus {
        border-color: #667eea;
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 25px;
        background: linear-gradient(120deg, #667eea, #764ba2);
        color: white;
        font-size: 15px;
        cursor: pointer;
        transition: opacity 0.3s;
    }

    .btn-submit:hover {
        opacity: 0.9;
    }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
    }

    .back-link a {
        text-decoration: none;
        color: #667eea;
    }

    .back-link a:hover {
        text-decoration: underline;
    }
</style>

</head>
<body>

<div class="form-container">

    <h1>Add Employee Details</h1>

    <!-- LOGIC KEPT EXACTLY SAME -->
    <form th:action="@{/employee/add}" method="POST">

        <div class="form-group">
            <label><b>Employee Names</b></label>
            <input type="text" name="employeeName" placeholder="Enter employee name" required>
        </div>

        <div class="form-group">
            <label><b>Employee Designation</b></label>
            <input type="text" name="desg" placeholder="Enter Designation" required>
        </div>

        <div class="form-group">
            <label><b>Age</b></label>
            <input type="number" name="age" placeholder="Enter Age"required>
        </div>

        <div class="form-group">
            <label><b>Salary</b></label>
            <input type="number" name="salary" placeholder="Enter Salary" required>
        </div>
        
        <div class="form-group">
            <label><b>Address</b></label>
            <input type="text" name="address" placeholder="Enter address" required>
        </div>

        <input type="submit" value="Add Employee" class="btn-submit">

    </form>

    <div class="back-link">
        <a th:href="@{/employee/view-employees}">← Back to Employees List</a>
    </div>
    <div class="back-link">
        <a th:href="@{/employee/}">← Home</a>
    </div>

</div>

</body>
</html>
