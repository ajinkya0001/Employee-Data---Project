<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Signup</title>

<style>
/* Same styles as login */
body {
    margin:0;
    font-family:'Segoe UI';
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(120deg,#5f2c82,#49a09d);
}

.container {
    width:800px;
    height:450px;
    display:flex;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

.left {
    flex:1;
    background: linear-gradient(120deg,#ff7e5f,#feb47b);
    color:white;
    padding:40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.right {
    flex:1;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.form-box {
    width:80%;
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:20px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:10px;
    border:none;
    border-radius:20px;
    background:linear-gradient(120deg,#ff7e5f,#feb47b);
    color:white;
}
</style>
</head>

<body>

<div class="container">

    <div class="left">
        <h1>Create Account 🚀</h1>
        <p>Join and start managing employee data efficiently.</p>
    </div>

    <div class="right">
        <div class="form-box">
            <h2>Signup</h2>

            <form th:action="@{/signup}" method="post">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Register</button>
            </form>

            <div style="text-align:center; margin-top:10px;">
                <a th:href="@{/login}">Already have account? Login</a>
            </div>
        </div>
    </div>

</div>

</body>
</html>
